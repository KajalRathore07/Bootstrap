<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="bootstrap.css">
    <link rel="stylesheet"href="form.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container py-4">
        <h2> Registration Form</h2>
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text"
            class="form-control">
            <label class="form-label">E-mail</label>
            <input type="text"
            class="form-control">
            <label class="form-label">Password</label>
            <input type="password"
            class="form-control">
            <small class="form-text text-muted">
                must be 8 to 20 characters
            </small><br>
            <label class="form-label">Country</label>
            <select class="form-select">
                <option>India</option>
                <option>Pakistan</option>
                <option>Bangladesh</option>
                <option>Nepal</option>
                <option>Bhutan</option>
            </select><br>
            <label class="form-label"> upload file </label>
            <input type="file"class="form-control">
            <label class="form-label">Amount</label>
            <input type="range"
            class="form-range"
            min="0"  max="100">
            <label class="form-label">Hobbies</label>
            <div class="form-check">
                <input type="checkbox" class="form-check-input" id="musicCheck">
                <label class="form-check-label" for="musicCheck">Music</label></div>
            <div class="form-check">
                <input type="checkbox" class="form-check-input" id="SportsCheck">
                <label class="form-check-label" for="SportsCheck">Sports</label></div>
            <div class="form-check">
                <input type="checkbox" class="form-check-input" id="CookingCheck">
                <label class="form-check-label" for="CookingCheck">Cooking</label></div>
            <div class="form-check">
                <input type="checkbox" class="form-check-input" id="DancingCheck">
                <label class="form-check-label" for="DancingCheck">Dancing</label></div>
            <label class="form-label">Gender</label>  
            <div class="form-check">
                <input type="radio" name="gender" class="form-check-input" id="m">
                <label class="form-check-label" for="m">Male</label>
            </div>
            <div class="form-check">
                <input type="radio" name="gender"
                class="form-check-input" id="f">
                <label class="form-check-label"
                for="f">Female</label>
            </div>
            <div class="form-check form-switch">
                <input type="checkbox" role="switch"
                class="form-check-input"
                id="notif">
                <label class="form-check-label"
                for="notif">E-mail Alerts</label>
            </div>
            <label class="form-label">Any Suggestion</label>
            <textarea class="form-control" rows="3"></textarea>
        </div>   
    </div>     
</body>
</html>
