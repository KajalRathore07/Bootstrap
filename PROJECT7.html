<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>VerifyMe - Step 1</title>

    <link rel="stylesheet" href="bootstrap.min.css">
    <link rel="stylesheet" href="style7.css">
</head>

<body>

<div class="container py-5">

    

    <div class="verify-card text-center text-white mb-4">

        <h2 class="fw-bold mb-2">✔ VerifyMe</h2>

        <p class="mb-0">
            Open your account — it takes about 3 minutes
        </p>

    </div>

    

    <div class="card shadow border-0 rounded-4">

        <div class="card-body p-4">

            

            <div class="row text-center mb-4">

                <div class="col">

                    <div class="step active-step">
                        1 • Identity
                    </div>

                </div>

                <div class="col">

                    <div class="step">
                        2 • Address
                    </div>

                </div>

                <div class="col">

                    <div class="step">
                        3 • Documents
                    </div>

                </div>

            </div>

            

            <div class="form-floating mb-3">

                <input
                    type="text"
                    class="form-control"
                    id="name"
                    placeholder="Full Name">

                <label for="name">
                    Full Legal Name
                </label>

            </div>

            
            <div class="form-floating mb-3">

                <input
                    type="email"
                    class="form-control"
                    id="email"
                    placeholder="Email">

                <label for="email">
                    Email Address
                </label>

            </div>

           

            <label class="form-label fw-semibold">
                Mobile Number
            </label>

            <div class="input-group mb-3">

                <span class="input-group-text">
                    +91
                </span>

                <input
                    type="tel"
                    class="form-control"
                    placeholder="9876543210">

            </div>

           
            <div class="form-floating mb-4">

                <input
                    type="text"
                    class="form-control"
                    id="pan"
                    placeholder="ABCDE1234F">

                <label for="pan">
                    PAN Number
                </label>

            </div>

            

            <div class="d-flex justify-content-end">

                <a href="address.html"
                   class="btn btn-success px-5 rounded-pill">

                    Next →

                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
